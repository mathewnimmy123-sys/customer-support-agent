steps:
  # Step 1: Initialize Python and map directory files
  - name: 'python:3.11-slim'
    id: 'Install Dependencies and Execute Cloud Deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔄 Initializing Python build container environment..."
        python -m venv venv
        source venv/bin/activate
        
        echo "📂 --- DEBUGGING: PRINTING ROOT FOLDER CONTENTS ---"
        ls -la
        
        echo "📂 --- DEBUGGING: PRINTING SUBAGENT FOLDER CONTENTS ---"
        ls -la support_agent/
        
        echo "📦 Upgrading base installer utilities..."
        python -m pip install --upgrade pip setuptools wheel
        
        echo "📥 Pre-installing required Google Vertex AI platform modules..."
        pip install google-cloud-aiplatform>=1.47.0 vertexai
        
        echo "🚀 Triggering production agent deployment sequence..."
        # This will attempt the root run. If it fails, the 'ls' logs above will tell us the exact filename!
        python deploy_agent_engine.py

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY