steps:
  # Step 1: Initialize Python inside a clean container
  - name: 'python:3.12-slim'
    id: 'Install Dependencies and Execute Cloud Deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔄 Initializing Clean Python 3.12 Environment..."
        
        echo "📦 Upgrading base installer utilities..."
        python3 -m pip install --upgrade pip setuptools wheel
        
        echo "📥 Installing Vertex AI and forcing stable packaging constraint..."
        # By putting them in the same line and using --no-deps or a strict constraint, we lock it down completely
        python3 -m pip install packaging==24.0 google-cloud-aiplatform>=1.47.0 vertexai --upgrade-strategy only-if-needed

        echo "🚀 Triggering production agent deployment sequence..."
        python3 deploy.py

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY