steps:
  # Step 1: Initialize Python inside a clean container
  - name: 'python:3.11-slim'
    id: 'Install Dependencies and Execute Cloud Deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔄 Initializing Python build container environment..."
        python -m venv venv
        source venv/bin/activate
        
        echo "📦 Upgrading base installer utilities..."
        pip install --upgrade pip setuptools wheel
        
        echo "📥 Pre-installing required Google Vertex AI platform modules..."
        pip install google-cloud-aiplatform>=1.47.0 vertexai
        
        echo "🚀 Triggering production agent deployment sequence..."
        python deploy_agent_engine.py

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY