# Version 1.0.5 - Absolute Environment Locking
steps:
  # Step 1: Initialize Python inside a clean container
  - name: 'python:3.12-slim'
    id: 'Install Dependencies and Execute Cloud Deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔄 Initializing Clean Python 3.12 Environment..."
        
        echo "📦 Upgrading base installer utilities..."
        python3 -m pip install --upgrade pip setuptools wheel
        
        echo "🔒 Locking Python 3.12 networking ecosystem constraints..."
        # We explicitly lock these BEFORE pulling the main Vertex AI libraries
        python3 -m pip install "aiohttp<3.11.0" "aiosignal<1.4.0" "frozenlist<1.5.0" "typing_extensions>=4.11.0"
        
        echo "📥 Installing Vertex AI Agent Engines suite with constrained fallback handling..."
        # Notice the addition of --no-deps or explicit dependency safety injection
        python3 -m pip install packaging==24.0 cloudpickle
        python3 -m pip install "google-cloud-aiplatform[agent_engines]>=1.47.0" vertexai --upgrade-strategy only-if-needed

        echo "🚀 Triggering production agent deployment sequence..."
        python3 deploy.py

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY