# cloudbuild.yaml
steps:
  - name: 'python:3.11-slim'
    id: 'live-agent-engine-deployment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "==> Step 1: Upgrading deployment environment dependencies"
        python3 -m pip install -q --no-cache-dir --upgrade pip setuptools wheel
        python3 -m pip install -q --no-cache-dir \
          "packaging==24.2" \
          "google-cloud-aiplatform[reasoningengine]==1.71.1"

        echo "==> Step 2: Running deploy.py to trigger live Vertex resource creation"
        python3 deploy.py

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY