# cloudbuild.yaml
steps:
  - name: 'python:3.11-slim'
    id: 'verify-and-stage-agent'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e

        echo "==> Step 1: Upgrade baseline installer tools"
        python3 -m pip install -q --no-cache-dir --upgrade pip setuptools wheel

        echo "==> Step 2: Install project framework requirements"
        python3 -m pip install -q --no-cache-dir \
          "packaging==24.2" \
          "google-cloud-aiplatform[reasoningengine]==1.71.1" \
          "pydantic>=2.10.0,<3.0.0"

        echo "==> Step 3: Executing Agent Verification Stack"
        python3 deploy.py

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY